mixed-port: 7890
allow-lan: true
mode: rule
ipv6: false
log-level: info
proxy-providers:
  local:
    type: file
    path: ./proxy_provider/local.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
proxy-groups:
- name: ChatGPT
  type: select
  filter: (?i)US|Silk|VPS
  _index: 0
  use:
  - local
- name: Fast
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 600
  use:
  - local
- name: JP
  type: select
  filter: (?i)JP|Japan|Lvyun
  use:
  - local
- name: US
  type: select
  filter: (?i)US|United States|Silk|VPS
  _index: 3
  use:
  - local
- name: 🎬Youtube
  type: select
  proxies:
  - Fast
  - US
  - JP
  use:
  - local
- name: ✈️Telegram
  type: select
  proxies:
  - Fast
  - US
  - JP
  use:
  - local
- name: 🎬Netflix
  type: select
  proxies:
  - US
  - Fast
  - JP
  use:
  - local
- name: 🎮Steam
  type: select
  proxies:
  - Fast
  - 🚀直接连接
  use:
  - local
- name: 🎬哔哩哔哩
  type: select
  proxies:
  - 🚀直接连接
  use:
  - local
- name: 🎬国外媒体
  type: select
  proxies:
  - Fast
  - US
  - JP
  use:
  - local
- name: 🍎苹果服务
  type: select
  proxies:
  - 🚀直接连接
  - US
  - Fast
  - JP
  _index: 15
  use:
  - local
- name: 🛑 广告拦截
  type: select
  proxies:
  - REJECT
  - DIRECT
  _index: 10
  use:
  - local
- name: 🔰国外流量
  type: select
  proxies:
  - Fast
  - US
  - JP
  _index: 1
  use:
  - local
- name: ⚓️其他流量
  type: select
  proxies:
  - 🚀直接连接
  - Fast
  - US
  - JP
  use:
  - local
- name: 🚀直接连接
  type: select
  proxies:
  - DIRECT
  _index: 11
  use:
  - local
- name: AI
  type: select
  proxies:
  - US
  - Fast
  - JP
  use:
  - local
- name: Proxy
  type: select
  proxies:
  - US
  - Fast
  - JP
  use:
  - local
- name: Microsoft
  type: select
  proxies:
  - 🚀直接连接
  - US
  - Fast
  - JP
  use:
  - local
- name: Telegram
  type: select
  proxies:
  - US
  - Fast
  - JP
  use:
  - local
- name: Apple
  type: select
  proxies:
  - 🚀直接连接
  - US
  - Fast
  - JP
  use:
  - local
- name: 流媒体
  type: select
  proxies:
  - US
  - Fast
  - JP
  use:
  - local
rule-providers:
  ai:
    type: http
    behavior: classical
    path: ./ruleset/ai.yaml
    url: https://raw.githubusercontent.com/yueker/rules/refs/heads/main/rules/ai.yaml
    interval: 86400
  proxy:
    type: http
    behavior: classical
    path: ./ruleset/proxy.yaml
    url: https://raw.githubusercontent.com/yueker/rules/refs/heads/main/rules/proxy.yaml
    interval: 86400
  direct:
    type: http
    behavior: classical
    path: ./ruleset/direct.yaml
    url: https://raw.githubusercontent.com/yueker/rules/refs/heads/main/rules/direct.yaml
    interval: 86400
  microsoft:
    type: http
    behavior: classical
    path: ./ruleset/microsoft.yaml
    url: https://raw.githubusercontent.com/yueker/rules/refs/heads/main/rules/microsoft.yaml
    interval: 86400
  telegram:
    type: http
    behavior: classical
    path: ./ruleset/telegram.yaml
    url: https://raw.githubusercontent.com/yueker/rules/refs/heads/main/rules/telegram.yaml
    interval: 86400
  reject:
    type: http
    behavior: classical
    path: ./ruleset/reject.yaml
    url: https://raw.githubusercontent.com/yueker/rules/refs/heads/main/rules/reject.yaml
    interval: 86400
  apple:
    type: http
    behavior: classical
    path: ./ruleset/apple.yaml
    url: https://raw.githubusercontent.com/yueker/rules/refs/heads/main/rules/apple.yaml
    interval: 86400
  streaming:
    type: http
    behavior: classical
    path: ./ruleset/streaming.yaml
    url: https://raw.githubusercontent.com/yueker/rules/refs/heads/main/rules/streaming.yaml
    interval: 86400
rules:
- RULE-SET,ai,AI
- RULE-SET,proxy,Proxy
- RULE-SET,direct,DIRECT
- RULE-SET,microsoft,Microsoft
- RULE-SET,telegram,Telegram
- RULE-SET,reject,REJECT
- RULE-SET,apple,Apple
- RULE-SET,streaming,流媒体
- MATCH,Proxy
